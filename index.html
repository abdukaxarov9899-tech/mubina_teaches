<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mubina_teaches — Ingliz tili ko'nikmalarini rivojlantirish platformasi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
</head>
<body style="margin:0;">

<style>
  :root{
    --bg:#0F1D33;
    --bg-soft:#152947;
    --text:#F0EEE2;
    --text-dim:#9CA0AE;
    --paper:#F0EEE2;
    --paper-dim:#E4E1D2;
    --ink:#12213B;
    --ink-dim:#5B6478;
    --gold:#C8A233;
    --teal:#2E6B5E;
    --rust:#AE4B32;
    --line:rgba(240,238,226,0.14);
  }
  #eplat[data-theme="light"]{
    --bg:#F6F3EA;
    --bg-soft:#FFFFFF;
    --text:#22304A;
    --text-dim:#6B7488;
    --paper:#FFFFFF;
    --paper-dim:#F1EEE3;
    --ink:#22304A;
    --ink-dim:#6B7488;
    --gold:#B8862E;
    --teal:#2E6B5E;
    --rust:#B14B2F;
    --line:rgba(34,48,74,0.12);
  }
  #eplat[data-theme="night"]{
    --bg:#08090D;
    --bg-soft:#131620;
    --text:#E7E9F2;
    --text-dim:#7C8296;
    --paper:#171A24;
    --paper-dim:#1F2330;
    --ink:#E7E9F2;
    --ink-dim:#9CA2B6;
    --gold:#4FE0C4;
    --teal:#8B7CF6;
    --rust:#FF6B6B;
    --line:rgba(231,233,242,0.1);
  }
  #eplat[data-theme="night"] .card{ box-shadow:0 0 0 1px var(--line); }
  #eplat[data-theme="night"] .opt.selected{ background:#22283A; }
  #eplat[data-theme="night"] .opt.correct{ background:#16302B; }
  #eplat[data-theme="night"] .opt.wrong{ background:#3A1E22; }
  html,body{height:100%;}
  *{box-sizing:border-box;}
  body,html{margin:0;padding:0;}
  #eplat{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:0;
    position:relative;
    overflow-x:hidden;
  }
  #eplat .wrap{max-width:920px;margin:0 auto;padding:28px 20px 60px;}
  #eplat h1,#eplat h2,#eplat h3,#eplat .display{
    font-family:'Fraunces',serif;
    letter-spacing:-0.01em;
  }
  #eplat .mono{font-family:'IBM Plex Mono',monospace;}
  #eplat .eyebrow{
    text-transform:uppercase;
    letter-spacing:0.14em;
    font-size:11px;
    color:var(--gold);
    font-weight:600;
    margin:0 0 6px;
  }
  #eplat .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding-bottom:18px;margin-bottom:24px;border-bottom:1px solid var(--line);
  }
  #eplat .brand{display:flex;align-items:center;gap:10px;cursor:pointer;}
  #eplat .brand .mark{
    width:34px;height:34px;border:1.5px solid var(--gold);border-radius:3px;
    display:flex;align-items:center;justify-content:center;color:var(--gold);
    font-family:'Fraunces',serif;font-weight:700;font-size:16px;transform:rotate(-3deg);
  }
  #eplat .brand .name{font-family:'Fraunces',serif;font-size:18px;font-weight:600;}
  #eplat .brand .name span{color:var(--gold);}
  #eplat .icon-btn{
    background:none;border:1px solid var(--line);color:var(--text);
    padding:8px 12px;border-radius:4px;cursor:pointer;font-size:13px;
    font-family:'Inter',sans-serif;transition:.15s;
  }
  #eplat .icon-btn:hover{border-color:var(--gold);color:var(--gold);}
  #eplat .icon-btn.tab-active{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:700;}
  #eplat .btn{
    background:var(--gold);color:var(--ink);border:none;padding:13px 22px;
    border-radius:3px;font-weight:700;cursor:pointer;font-size:14.5px;
    font-family:'Inter',sans-serif;letter-spacing:.01em;transition:.15s;
  }
  #eplat .btn:hover{background:#DDB544;}
  #eplat .btn.secondary{background:transparent;color:var(--text);border:1.5px solid var(--text);}
  #eplat .btn.secondary:hover{border-color:var(--gold);color:var(--gold);}
  #eplat .btn.teal{background:var(--teal);color:#F0EEE2;}
  #eplat .btn.teal:hover{background:#387D6E;}
  #eplat .btn:disabled{opacity:.4;cursor:not-allowed;}
  #eplat .btn-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px;}

  #eplat .hero{
    display:flex;flex-direction:column;gap:14px;padding:38px 0 30px;
  }
  #eplat .hero h1{font-size:38px;line-height:1.08;margin:0;font-weight:600;}
  #eplat .hero p{font-size:15.5px;color:var(--text-dim);max-width:520px;line-height:1.55;margin:0;}
  #eplat .stat-strip{display:flex;gap:26px;margin-top:6px;flex-wrap:wrap;}
  #eplat .stat-strip .stat b{font-family:'Fraunces',serif;font-size:26px;display:block;color:var(--gold);}
  #eplat .stat-strip .stat span{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;}

  #eplat .card{
    background:var(--paper);color:var(--ink);border-radius:6px;
    padding:22px 24px;position:relative;
  }
  #eplat .card.ticket{
    border-radius:6px;
    background-image: radial-gradient(circle at 0 50%, var(--bg) 6px, transparent 7px),
                       radial-gradient(circle at 100% 50%, var(--bg) 6px, transparent 7px);
    background-repeat:no-repeat;
    background-position: left center, right center;
  }
  #eplat .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:640px){#eplat .grid{grid-template-columns:1fr;}#eplat .hero h1{font-size:29px;}}

  #eplat .dir-card{
    background:var(--bg-soft);border:1px solid var(--line);border-radius:6px;
    padding:22px;cursor:pointer;transition:.18s;position:relative;overflow:hidden;
  }
  #eplat .dir-card:hover{border-color:var(--gold);transform:translateY(-2px);}
  #eplat .dir-card .tag{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--teal);background:rgba(46,107,94,.18);display:inline-block;padding:3px 8px;border-radius:3px;margin-bottom:10px;font-weight:600;}
  #eplat .dir-card h3{margin:0 0 8px;font-size:20px;}
  #eplat .dir-card p{margin:0;color:var(--text-dim);font-size:13.5px;line-height:1.5;}
  #eplat .dir-card .meta{margin-top:14px;font-size:12px;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;}

  #eplat .unit-row{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--bg-soft);border:1px solid var(--line);border-radius:5px;
    padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:.15s;
  }
  #eplat .unit-row:hover{border-color:var(--gold);}
  #eplat .unit-row .u-left{display:flex;align-items:center;gap:14px;}
  #eplat .unit-row .u-num{font-family:'Fraunces',serif;color:var(--gold);font-size:20px;min-width:34px;}
  #eplat .unit-row .u-title{font-weight:600;font-size:15px;}
  #eplat .unit-row .u-sub{font-size:12px;color:var(--text-dim);margin-top:3px;}
  #eplat .unit-row .u-best{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--teal);}

  #eplat .quiz-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  #eplat .timer{
    font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;
    background:var(--bg-soft);border:1px solid var(--line);padding:8px 14px;border-radius:4px;
  }
  #eplat .timer.low{color:var(--rust);border-color:var(--rust);}
  #eplat .progress-bar{height:5px;background:var(--bg-soft);border-radius:3px;overflow:hidden;margin-bottom:26px;}
  #eplat .progress-bar i{display:block;height:100%;background:var(--gold);transition:.25s;}
  #eplat .q-type{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--teal);font-weight:700;margin-bottom:10px;}
  #eplat .q-prompt{font-size:20px;line-height:1.4;margin:0 0 22px;font-weight:600;font-family:'Fraunces',serif;}
  #eplat .q-prompt .blank{border-bottom:2px solid var(--gold);padding:0 6px;color:var(--gold);}
  #eplat .opt{
    display:flex;align-items:center;gap:14px;background:var(--paper-dim);
    border:1.5px solid transparent;border-radius:5px;padding:13px 16px;margin-bottom:10px;
    cursor:pointer;transition:.12s;
  }
  #eplat .opt:hover{border-color:var(--teal);}
  #eplat .opt.selected{border-color:var(--gold);background:#EAE3C4;}
  #eplat .opt .letter{
    width:26px;height:26px;border-radius:50%;background:var(--ink);color:var(--paper);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
    font-family:'IBM Plex Mono',monospace;flex-shrink:0;
  }
  #eplat .opt.selected .letter{background:var(--gold);color:var(--ink);}
  #eplat .opt.correct{border-color:var(--teal);background:#DCEAE4;}
  #eplat .opt.correct .letter{background:var(--teal);color:#fff;}
  #eplat .opt.wrong{border-color:var(--rust);background:#F3DCD3;}
  #eplat .opt.wrong .letter{background:var(--rust);color:#fff;}
  #eplat .opt-text{font-size:14.5px;color:var(--ink);}

  #eplat .review-item{background:var(--bg-soft);border:1px solid var(--line);border-radius:5px;padding:16px 18px;margin-bottom:12px;}
  #eplat .review-item .rq{font-weight:600;margin-bottom:8px;font-size:14.5px;}
  #eplat .review-item .expl{font-size:12.5px;color:var(--text-dim);margin-top:8px;border-top:1px dashed var(--line);padding-top:8px;}
  #eplat .badge-ok{color:var(--teal);font-weight:700;font-size:12px;}
  #eplat .badge-no{color:var(--rust);font-weight:700;font-size:12px;}

  #eplat .score-hero{text-align:center;padding:30px 20px;}
  #eplat .score-hero .ring{
    width:150px;height:150px;border-radius:50%;margin:0 auto 18px;
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    border:6px solid var(--gold);background:var(--bg-soft);
  }
  #eplat .score-hero .ring b{font-family:'Fraunces',serif;font-size:34px;color:var(--gold);}
  #eplat .score-hero .ring span{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;}

  #eplat .cert{
    background:var(--paper);color:var(--ink);border:3px double var(--gold);
    border-radius:8px;padding:44px 36px;text-align:center;position:relative;
  }
  #eplat .cert .stamp{
    position:absolute;top:26px;right:28px;width:76px;height:76px;border:2px solid var(--rust);
    border-radius:50%;color:var(--rust);display:flex;align-items:center;justify-content:center;
    transform:rotate(12deg);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
    font-family:'IBM Plex Mono',monospace;text-align:center;line-height:1.3;
  }
  #eplat .cert .eyebrow{color:var(--teal);}
  #eplat .cert h2{font-size:30px;margin:6px 0 2px;}
  #eplat .cert .cert-name{font-size:24px;color:var(--gold);margin:18px 0 6px;font-weight:600;font-family:'Fraunces',serif;border-bottom:1px solid var(--ink);display:inline-block;padding:0 10px 4px;}
  #eplat .cert .cert-line{font-size:14px;margin:4px 0;color:var(--ink-dim);}
  #eplat .cert .cert-score{font-family:'IBM Plex Mono',monospace;font-size:15px;margin-top:14px;}

  #eplat input[type=text],#eplat textarea,#eplat select{
    width:100%;padding:10px 12px;border-radius:4px;border:1px solid var(--line);
    background:var(--bg-soft);color:var(--text);font-family:'Inter',sans-serif;font-size:13.5px;margin-bottom:10px;
  }
  #eplat label.f{font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);display:block;margin-bottom:4px;}
  #eplat .admin-block{background:var(--bg-soft);border:1px solid var(--line);border-radius:6px;padding:18px;margin-bottom:16px;}
  #eplat .admin-list-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;}
  #eplat .del{color:var(--rust);cursor:pointer;font-size:12px;background:none;border:none;font-family:'Inter',sans-serif;}

  #eplat .lb-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--line);font-size:13.5px;}
  #eplat .lb-row .lb-rank{font-family:'Fraunces',serif;color:var(--gold);width:28px;}
  #eplat .lb-row.me{background:rgba(200,162,51,.1);border-radius:4px;}

  #eplat .empty{text-align:center;padding:40px 20px;color:var(--text-dim);}
  #eplat .back-link{background:none;border:none;color:var(--gold);cursor:pointer;font-size:13px;font-family:'Inter',sans-serif;padding:0;margin-bottom:16px;display:inline-flex;align-items:center;gap:6px;}
  #eplat .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  #eplat .tab{padding:8px 14px;border-radius:20px;border:1px solid var(--line);background:transparent;color:var(--text);cursor:pointer;font-size:12.5px;font-family:'Inter',sans-serif;}
  #eplat .tab.active{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:700;}
  #eplat .modal-overlay{position:fixed;inset:0;background:rgba(6,12,24,.72);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
  #eplat .modal-box{background:var(--paper);color:var(--ink);border-radius:8px;padding:24px 22px;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4);}
  #eplat .modal-box p{margin:0 0 6px;font-size:14.5px;line-height:1.5;}

  #eplat .theme-row{display:flex;gap:10px;align-items:center;}
  #eplat .theme-dot{
    width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent;
    display:flex;align-items:center;justify-content:center;font-size:14px;transition:.15s;
  }
  #eplat .theme-dot.active{border-color:var(--gold);transform:scale(1.08);}
  #eplat .theme-card{
    border:1px solid var(--line);border-radius:6px;padding:14px;cursor:pointer;
    background:var(--bg-soft);transition:.15s;text-align:center;
  }
  #eplat .theme-card.active{border-color:var(--gold);}
  #eplat .theme-swatch{height:44px;border-radius:4px;margin-bottom:8px;}

  #eplat .avatar{
    width:84px;height:84px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);
    background:var(--bg-soft);display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;font-size:30px;color:var(--gold);flex-shrink:0;
  }
  #eplat .profile-head{display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
  #eplat .achv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:12px;}
  #eplat .achv{
    border:1px solid var(--line);border-radius:6px;padding:12px;text-align:center;background:var(--bg-soft);
    opacity:.35;filter:grayscale(1);
  }
  #eplat .achv.earned{opacity:1;filter:none;border-color:var(--gold);}
  #eplat .achv .ae{font-size:24px;display:block;margin-bottom:6px;}
  #eplat .achv .at{font-size:11.5px;font-weight:700;}
  #eplat .achv .ad{font-size:10.5px;color:var(--text-dim);margin-top:3px;}

  #eplat .q-hint{font-style:italic;font-size:13px;color:var(--ink-dim);margin:-8px 0 14px;}
  #eplat .summary-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:14px 0;}
  #eplat .summary-strip .sitem{background:var(--bg-soft);border:1px solid var(--line);border-radius:6px;padding:12px;text-align:center;}
  #eplat .summary-strip .sitem b{font-family:'Fraunces',serif;font-size:20px;color:var(--gold);display:block;}
  #eplat .summary-strip .sitem span{font-size:10.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;}
</style>

<div id="eplat">
  <div class="wrap" id="eplat-app"></div>
</div>

<script>
(function(){

  // ---------- SEED CONTENT ----------
  function seedContent(){
    return {
      directions: [
        {
          id: "collocations-advanced",
          title: "English Collocations in Use — Advanced",
          tag: "Collocations",
          desc: "So'zlarning tabiiy \"hamrohlari\" bilan ishlashni mustahkamlang: fe'l+ot, sifat+ot birikmalari.",
          units: [
            {
              id: "col-u1",
              title: "1-unit: Muvaffaqiyat va yutuqlar",
              questions: colUnit1()
            },
            {
              id: "col-u2",
              title: "2-unit: Muammo va yechim",
              questions: colUnit2()
            }
          ]
        },
        {
          id: "vocab-upper",
          title: "English Vocabulary in Use — Upper-Intermediate",
          tag: "Vocabulary",
          desc: "Yuqori-o'rta daraja lug'atini kengaytiring: tavsif, fikr bildirish va akademik so'zlar.",
          units: [
            {
              id: "voc-u1",
              title: "1-unit: Insonni tavsiflash",
              questions: vocUnit1()
            },
            {
              id: "voc-u2",
              title: "2-unit: Akademik va mavhum lug'at",
              questions: vocUnit2()
            },
            {
              id: "voc-u3",
              title: "3-unit: Idiomalar va lavozimlar",
              questions: vocUnit3()
            }
          ]
        }
      ]
    };
  }

  function Q(type, prompt, options, answer, explain, hint){
    return {id: 'q'+Math.random().toString(36).slice(2,9), type, prompt, options, answer, explain, hint: hint||''};
  }

  function colUnit1(){
    return [
      Q("note","After sticking to his plan every single day, he finally ___ his goal.",["reached","made","took","held"],0,"'reach a goal/target' — maqsadga erishmoq degan tabiiy birikma."),
      Q("note","The company ___ a new record in revenue this year.",["set a record","did a record","made a record","took a record"],0,"'set a record' — rekord o'rnatmoq."),
      Q("translate","Choose the correct English translation of the Uzbek phrase: 'rivojlanish qilmoq / oldinga siljimoq'",["make progress","do progress","take progress","give progress"],0,"'make progress' — rivojlanish, taraqqiyot qilmoq."),
      Q("translate","Choose the correct English translation of: 'mas'uliyatni o'z zimmasiga olmoq'",["take responsibility","hold responsibility","catch responsibility","get responsibility"],0,"'take responsibility (for)' — javobgarlikni bo'yniga olmoq."),
      Q("match","Which collocation matches this definition: 'to achieve something after a lot of effort'?",["accomplish a goal","lose an opportunity","waste an effort","cancel a plan"],0,"'accomplish a goal' — katta harakatdan so'ng maqsadga yetishmoq."),
      Q("note","They reviewed all the evidence again in order to ___ a conclusion.",["come to a conclusion","make a conclusion","do a conclusion","take a conclusion"],0,"'come to / reach a conclusion' — xulosaga kelmoq."),
      Q("note","After long negotiations, the two sides finally ___ an agreement.",["reached an agreement","made an agreement","took an agreement","did an agreement"],0,"'reach an agreement' — kelishuvga erishmoq."),
      Q("translate","Choose the correct English translation of: 'e'tiborni jalb qilmoq'",["attract attention","catch attention","fetch attention","hold attention"],0,"'attract attention' — diqqatni jalb etmoq."),
      Q("match","Which phrase matches this definition: 'a piece of work done extremely carefully and in detail'?",["thorough research","fast research","rough research","brief research"],0,"'thorough' — juda batafsil, puxta bajarilgan."),
      Q("note","They worked extremely hard in order to ___ the deadline before the project was due.",["meet the deadline","catch the deadline","hold the deadline","hit the deadline"],0,"'meet a deadline' — muddatga ulgurmoq."),
      Q("translate","Choose the correct English translation of: 'va'dasini bajarmoq / ushlab turmoq'",["keep a promise","hold a promise","do a promise","take a promise"],0,"'keep a promise' — va'daga vafo qilmoq."),
      Q("match","Which collocation matches: 'to gain skill or knowledge by doing something over time'?",["gain experience","lose experience","spend experience","waste experience"],0,"'gain experience' — tajriba orttirmoq."),
      Q("note","This piece of news ___ a lot of public awareness.",["raised awareness","made awareness","took awareness","gave awareness"],0,"'raise awareness' — ogohlantirish/xabardorlikni oshirmoq."),
      Q("translate","Choose the correct English translation of: 'imkoniyatdan foydalanmoq'",["take advantage of","make advantage of","do advantage of","hold advantage of"],0,"'take advantage of' — imkoniyatdan foydalanmoq."),
      Q("match","Which phrase matches: 'to have a bad effect on someone's reputation'?",["damage someone's reputation","build someone's reputation","raise someone's reputation","earn someone's reputation"],0,"'damage a reputation' — obro'ga putur yetkazmoq.")
    ];
  }

  function colUnit2(){
    return [
      Q("note","The company took emergency measures in order to ___ the financial crisis.",["tackle the problem","catch the problem","hold the problem","win the problem"],0,"'tackle a problem' — muammoni hal qilishga kirishmoq."),
      Q("translate","Choose the correct English translation of: 'muammoni keltirib chiqarmoq'",["cause a problem","make a problem","do a problem","build a problem"],0,"'cause a problem' — muammo tug'dirmoq."),
      Q("note","Experts warn that the new technology may ___ to public health.",["pose a threat","make a threat","do a threat","hold a threat"],0,"'pose a threat' — xavf tug'dirmoq."),
      Q("match","Which phrase matches: 'to find a way of dealing with a difficulty successfully'?",["solve a problem","hide a problem","copy a problem","sell a problem"],0,"'solve a problem' — muammoni yechmoq."),

  // ---------- STORAGE HELPERS (localStorage — works standalone, per-browser only) ----------
  const LS_PREFIX = 'eplat:';
  function lsGet(key){
    try{
      const v = localStorage.getItem(LS_PREFIX+key);
      return v===null ? null : v;
    }catch(e){ return null; }
  }
  function lsSet(key, value){
    try{ localStorage.setItem(LS_PREFIX+key, value); return true; }catch(e){ return false; }
  }
  async function loadContent(){
    const v = lsGet('content:v3');
    if(v){ try{ return JSON.parse(v); }catch(e){} }
    const seed = seedContent();
    lsSet('content:v3', JSON.stringify(seed));
    return seed;
  }
  async function saveContent(content){
    lsSet('content:v3', JSON.stringify(content));
  }
  async function getAttempts(unitId){
    const v = lsGet('attempts:'+unitId);
    if(v){ try{ return JSON.parse(v); }catch(e){} }
    return [];
  }
  async function saveAttempt(unitId, attempt){
    const list = await getAttempts(unitId);
    list.unshift(attempt);
    lsSet('attempts:'+unitId, JSON.stringify(list.slice(0,20)));
  }
  async function getLeaderboard(unitId){
    const v = lsGet('leaderboard:'+unitId);
    if(v){ try{ return JSON.parse(v); }catch(e){} }
    return [];
  }
  async function pushLeaderboard(unitId, entry){
    const list = await getLeaderboard(unitId);
    list.push(entry);
    list.sort((a,b)=> b.percent - a.percent || b.score - a.score);
    lsSet('leaderboard:'+unitId, JSON.stringify(list.slice(0,25)));
  }

  const S = {
    screen: 'home',
    content: null,
    dirId: null,
    unitId: null,
    quiz: null, // {questions, index, answers:[], startedAt, timeLeft, timerHandle}
    lastResult: null,
    reviewData: null,
    playerName: lsGet('playerName') || '',
    avatar: lsGet('avatar') || '',
    theme: lsGet('theme') || 'classic',
    statsUnit: null,
    modal: null,
    lbUnit: null,
    _statsAttempts: []
  };

  const THEMES = [
    {id:'classic', label:'Klassik', swatch:'linear-gradient(135deg,#0F1D33,#C8A233)'},
    {id:'light', label:'Ochiq', swatch:'linear-gradient(135deg,#F6F3EA,#B8862E)'},
    {id:'night', label:'Tungi', swatch:'linear-gradient(135deg,#08090D,#4FE0C4)'}
  ];
  function applyTheme(){
    const el = document.getElementById('eplat');
    if(el) el.dataset.theme = S.theme;
  }

  const root = document.getElementById('eplat-app');

  function findDir(id){ return S.content.directions.find(d=>d.id===id); }
  function findUnit(dirId, unitId){ const d=findDir(dirId); return d ? d.units.find(u=>u.id===unitId) : null; }

  function fmtTime(sec){
    const m = Math.floor(sec/60), s = sec%60;
    return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  }

  // ---------- RENDER ----------
  async function render(){
    applyTheme();
    if(!S.content) S.content = await loadContent();
    if(S.screen==='admin' && !ADMIN_MODE) S.screen = 'home';
    let html = '';
    if(S.screen==='home') html = renderHome();
    else if(S.screen==='directions') html = renderDirections();
    else if(S.screen==='units') html = renderUnits();
    else if(S.screen==='unit-detail') html = await renderUnitDetail();
    else if(S.screen==='quiz') html = renderQuiz();
    else if(S.screen==='results') html = renderResults();
    else if(S.screen==='certificate') html = renderCertificate();
    else if(S.screen==='leaderboard') html = await renderLeaderboardPage();
    else if(S.screen==='about') html = renderAbout();
    else if(S.screen==='stats') html = await renderStats();
    else if(S.screen==='profile') html = await renderProfile();
    else if(S.screen==='review') html = renderReview();
    else if(S.screen==='admin') html = renderAdmin();
    root.innerHTML = topbar() + html + renderModal();
  }

  function renderModal(){
    if(!S.modal) return '';
    const m = S.modal;
    if(m.type==='prompt'){
      return `
        <div class="modal-overlay" onclick="if(event.target===this) EPLAT.modalNo()">
          <div class="modal-box">
            <p>${m.msg}</p>
            <input type="text" id="modal-prompt-input" value="${(m.value||'').replace(/"/g,'&quot;')}" placeholder="Ism Familiya">
            <div class="btn-row" style="margin-top:6px;">
              <button class="btn" onclick="EPLAT.modalPromptSave()">Saqlash</button>
              <button class="btn secondary" onclick="EPLAT.modalNo()">Bekor qilish</button>
            </div>
          </div>
        </div>`;
    }
    return `
      <div class="modal-overlay" onclick="if(event.target===this) EPLAT.modalNo()">
        <div class="modal-box">
          <p>${m.msg}</p>
          <div class="btn-row" style="margin-top:14px;">
            ${m.type==='confirm'
              ? `<button class="btn" onclick="EPLAT.modalYes()">Ha, davom etish</button><button class="btn secondary" onclick="EPLAT.modalNo()">Bekor qilish</button>`
              : `<button class="btn" onclick="EPLAT.modalNo()">Tushunarli</button>`}
          </div>
        </div>
      </div>`;
  }

  function topbar(){
    const tabs = [
      {id:'home', label:'Bosh sahifa'},

      {id:'about', label:'Platforma haqida'},

      ? `<img src="${S.avatar}" style="width:22px;height:22px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:6px;">`
      : '👤 ';
    return `
      <div class="topbar">
        <div class="brand" onclick="EPLAT.navTo('home')">
          <div class="mark">M</div>
          <div class="name">Mubina<span>_teaches</span></div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;justify-content:flex-end;">
          ${tabs.map(t=>{
            const active = S.screen===t.id || (t.id==='directions' && quizGroup.includes(S.screen));

        </div>
      </div>`;
  }

  const TYPE_LABELS = {
    note: "Note completion",
    translate: "Tarjima (uzb → eng)",
    match: "Match definition",
    meaning: "Meaning",
    defblank: "Definition + fill"
  };

  function renderQuiz(){
    const q = S.quiz;
    const item = q.questions[q.index];
    const selected = q.answers[q.index];
    const typeLabel = TYPE_LABELS[item.type] || item.type;
    const timerLow = q.timeLeft <= 60;
    return `
      <button class="back-link" onclick="EPLAT.confirmExitQuiz()">← Testdan chiqish</button>
      <div class="quiz-head">
        <div class="mono" style="font-size:13px;color:var(--text-dim);">Savol ${q.index+1} / ${q.questions.length}</div>
        <div class="timer ${timerLow?'low':''}" id="quiz-timer">${fmtTime(q.timeLeft)}</div>
      </div>
      <div class="progress-bar"><i style="width:${((q.index)/q.questions.length*100)}%"></i></div>
      <div class="card">
        <div class="q-type">${typeLabel} · 2 ball</div>
        ${item.hint ? `<div class="q-hint">(${item.hint})</div>` : ''}
        <div class="q-prompt">${item.prompt.replace('___','<span class="blank">＿＿＿</span>')}</div>
        ${item.options.map((opt,i)=>`
          <div class="opt ${selected===i?'selected':''}" onclick="EPLAT.selectAnswer(${i})">
            <div class="letter">${['A','B','C','D'][i]}</div>
            <div class="opt-text">${opt}</div>
          </div>
        `).join('')}
      </div>
      <div class="btn-row">
        <button class="btn secondary" ${q.index===0?'disabled':''} onclick="EPLAT.prevQ()">← Oldingi</button>
        ${q.index < q.questions.length-1
          ? `<button class="btn" onclick="EPLAT.nextQ()">Keyingi →</button>`
          : `<button class="btn teal" onclick="EPLAT.finishQuiz()">Testni yakunlash</button>`}
      </div>
    `;
  }

  function renderAnswerBreakdown(questions, answers){
    return questions.map((item,i)=>{
      const sel = answers[i];
      const ok = sel===item.answer;
      const hintLine = item.hint ? `<div class="q-hint" style="margin:0 0 8px;">(${item.hint})</div>` : '';
      return `
      <div class="review-item">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
          <div class="rq">${i+1}. ${hintLine}${item.prompt.replace('___','＿＿＿')}</div>
          <div class="${ok?'badge-ok':'badge-no'}">${ok?'✓ TO\'G\'RI':'✗ XATO'}</div>
        </div>
        ${item.options.map((opt,oi)=>{
          let cls='';
          if(oi===item.answer) cls='correct';
          else if(oi===sel && sel!==item.answer) cls='wrong';
          return `<div class="opt ${cls}" style="cursor:default;"><div class="letter">${['A','B','C','D'][oi]}</div><div class="opt-text">${opt}</div></div>`;
        }).join('')}
        <div class="expl">${item.explain||''}</div>
      </div>`;
    }).join('');
  }

          `).join('')}

  }

  function computeAchievements(all){
    const totalTests = all.length;
    const bestPercent = all.length ? Math.max(...all.map(a=>a.percent)) : 0;
    const perfect = all.some(a=>a.percent===100);
    const unitsCovered = new Set(all.map(a=>a.unitId)).size;
    const fast = all.some(a=> a.timeSpent && a.timeSpent < 15*60);
    const dirsCovered = new Set(all.map(a=>a.dirTitle)).size;
    return [
      {emoji:'🌱', title:'Birinchi qadam', desc:'Birinchi testni topshirdingiz', earned: totalTests>=1},
      {emoji:'🔥', title:'Barqaror', desc:'5 marta test topshirdingiz', earned: totalTests>=5},
      {emoji:'💪', title:'Chidamli', desc:'15 marta test topshirdingiz', earned: totalTests>=15},
      {emoji:'🏅', title:'A\'lochi', desc:'100% natija bilan testni yakunladingiz', earned: perfect},
      {emoji:'🎯', title:'Snayper', desc:'70%+ natijaga erishdingiz', earned: bestPercent>=70},
      {emoji:'⚡', title:'Tezkor', desc:'15 daqiqadan tezroq test yakunladingiz', earned: fast},
      {emoji:'📚', title:'Unit ustasi', desc:'3 ta turli unitni sinab ko\'rdingiz', earned: unitsCovered>=3},
      {emoji:'🧭', title:'Ko\'p qirrali', desc:'2 ta turli yo\'nalishda test topshirdingiz', earned: dirsCovered>=2}
    ];
  }

        <label class="f">B javob</label><input type="text" id="nq-b">
        <label class="f">C javob</label><input type="text" id="nq-c">
        <label class="f">D javob</label><input type="text" id="nq-d">
        <label class="f">To'g'ri javob</label>
        <select id="nq-correct"><option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option></select>
        <label class="f">Izoh (natija sahifasida ko'rsatiladi)</label>
        <textarea id="nq-explain" rows="2"></textarea>
        <div class="btn-row">
          <button class="btn" onclick="EPLAT.saveNewQuestion('${dirId}','${unitId}')">Saqlash</button>
          <button class="btn secondary" onclick="document.getElementById('admin-question-form').innerHTML=''">Bekor qilish</button>
        </div>
      </div>
    `;
  }

  // ---------- ACTIONS ----------
  window.EPLAT = {
    setTheme(id){ S.theme = id; lsSet('theme', id); applyTheme(); render(); },
    async modalYes(){ const m=S.modal; S.modal=null; render(); if(m && m.onYes) await m.onYes(); },
    modalNo(){ S.modal=null; render(); },
    go(screen){ S.screen = screen; render(); window.scrollTo(0,0); },
    openDirection(id){ S.dirId = id; S.screen='units'; render(); },
    openUnit(unitId){ S.unitId = unitId; S.screen='unit-detail'; render(); },
    currentUnitId(){ return S.unitId; },

    async startQuiz(){
      const u = findUnit(S.dirId, S.unitId);
      const questions = [...u.questions];
      S.quiz = {
        questions,
        index: 0,
        answers: new Array(questions.length).fill(null),
        timeLeft: 35*60,
        startedAt: Date.now()
      };
      S.screen = 'quiz';
      render();
      S.quiz.timerHandle = setInterval(()=>{
        S.quiz.timeLeft--;
        const el = document.getElementById('quiz-timer');
        if(el){
          el.textContent = fmtTime(S.quiz.timeLeft);
          if(S.quiz.timeLeft<=60) el.classList.add('low');
        }
        if(S.quiz.timeLeft<=0){
          clearInterval(S.quiz.timerHandle);
          EPLAT.finishQuiz();
        }
      },1000);
    },
    selectAnswer(i){
      S.quiz.answers[S.quiz.index] = i;
      render();
    },
    nextQ(){ if(S.quiz.index < S.quiz.questions.length-1){ S.quiz.index++; render(); } },
    prevQ(){ if(S.quiz.index>0){ S.quiz.index--; render(); } },
    confirmExitQuiz(){
      S.modal = {type:'confirm', msg:"Testni tark etmoqchimisiz? Joriy urinish saqlanmaydi.", onYes(){
        if(S.quiz && S.quiz.timerHandle) clearInterval(S.quiz.timerHandle);
        S.quiz = null;
        EPLAT.go('unit-detail');
      }};
      render();
    },
    async finishQuiz(){
      if(S.quiz.timerHandle) clearInterval(S.quiz.timerHandle);
      const d = findDir(S.dirId);
      const u = findUnit(S.dirId, S.unitId);
      const qs = S.quiz.questions;
      const answers = S.quiz.answers;
      let correctCount = 0;
      qs.forEach((q,i)=>{ if(answers[i]===q.answer) correctCount++; });
      const total = qs.length*2;
      const score = correctCount*2;
      const percent = Math.round((score/total)*100);
      const timeSpent = 35*60 - S.quiz.timeLeft;
      const now = new Date();
      const date = now.toLocaleDateString('uz-UZ');
      const time = now.toLocaleTimeString('uz-UZ', {hour:'2-digit', minute:'2-digit'});
      const result = {unitTitle:u.title, questions:qs, answers, correctCount, total, score, percent, timeSpent, date, time};
      S.lastResult = result;
      const name = S.playerName || 'Foydalanuvchi';
      const entry = {name, dirTitle:d.title, unitTitle:u.title, unitId:u.id, score, total, percent, timeSpent, date, time, timestamp: now.getTime(), questions:qs, answers};
      await saveAttempt(u.id, entry);
      await pushLeaderboard(u.id, {name, dirTitle:d.title, unitTitle:u.title, unitId:u.id, score, total, percent, date, time, timestamp: now.getTime()});
      S.quiz = null;
      S.screen = 'results';
      render();
      window.scrollTo(0,0);
    },
    setPlayerName(v){ S.playerName = v; lsSet('playerName', v); },
    saveProfileName(){
      const input = document.getElementById('profile-name-input');
      const v = input ? input.value.trim() : '';
      if(!v){ S.modal={type:'alert', msg:"Iltimos, ismingizni kiriting."}; render(); return; }
      S.playerName = v; lsSet('playerName', v);
      render();
    },
    setNameAndStart(){
      const input = document.getElementById('name-gate-input');
      const v = input ? input.value.trim() : '';
      if(!v){ S.modal={type:'alert', msg:"Iltimos, ismingizni kiriting."}; render(); return; }
      S.playerName = v; lsSet('playerName', v);
      EPLAT.startQuiz();
    },
    editName(){
      S.modal = {type:'prompt', msg:"Ismingizni kiriting (natijalar va sertifikatda shu nom ishlatiladi):", value:S.playerName, onSave(v){ S.playerName=v; lsSet('playerName', v); }};
      render();
    },
    modalPromptSave(){
      const input = document.getElementById('modal-prompt-input');
      const v = input ? input.value.trim() : '';
      if(!v) return;
      const cb = S.modal.onSave;
      S.modal = null;
      render();
      if(cb) cb(v);
    },
    navTo(screen){
      if(S.screen==='quiz'){
        S.modal = {type:'confirm', msg:"Testni tark etmoqchimisiz? Joriy urinish saqlanmaydi.", onYes(){
          if(S.quiz && S.quiz.timerHandle) clearInterval(S.quiz.timerHandle);
          S.quiz = null;
          EPLAT.go(screen);
        }};
        render();
      } else {
        EPLAT.go(screen);
      }
    },
    openLeaderboard(unitId){ S.lbUnit = unitId; S.screen='leaderboard'; render(); },
    setStatsUnit(unitId){ S.statsUnit = unitId; render(); },
    viewCertificateFromStats(i){
      const a = S._statsAttempts[i];
      if(!a) return;
      S.lastResult = {unitTitle:a.unitTitle, score:a.score, total:a.total, percent:a.percent, date:a.date};
      if(a.name) S.playerName = a.name;
      S.screen = 'certificate';
      render();
      window.scrollTo(0,0);
    },
    viewReviewFromStats(i){
      const a = S._statsAttempts[i];
      if(!a || !a.questions) return;
      S.reviewData = a;
      S.screen = 'review';
      render();
      window.scrollTo(0,0);
    },
    onAvatarSelected(input){
      const file = input.files && input.files[0];
      if(!file) return;
      if(file.size > 1.5*1024*1024){ S.modal={type:'alert', msg:"Rasm hajmi juda katta. Iltimos 1.5MB dan kichik rasm tanlang."}; render(); return; }
      const reader = new FileReader();
      reader.onload = function(e){
        S.avatar = e.target.result;
        lsSet('avatar', S.avatar);
        render();
      };
      reader.readAsDataURL(file);
    },
    removeAvatar(){
      S.avatar = '';
      lsSet('avatar', '');
      render();
    },

    // Admin
    async addUnit(dirId){
      const input = document.getElementById('newunit-'+dirId);
      const title = input.value.trim();
      if(!title) return;
      const d = findDir(dirId);
      d.units.push({id:'u'+Math.random().toString(36).slice(2,9), title, questions:[]});
      await saveContent(S.content);
      render();
    },
    deleteUnit(dirId, unitId){
      S.modal = {type:'confirm', msg:"Ushbu unitni butunlay o'chirmoqchimisiz? Undagi barcha savollar ham o'chib ketadi.", async onYes(){
        const d = findDir(dirId);
        d.units = d.units.filter(u=>u.id!==unitId);
        await saveContent(S.content);
        render();
      }};
      render();
    },
    openAddQuestion(dirId, unitId){
      document.getElementById('admin-question-form').innerHTML = renderAddQuestionForm(dirId, unitId);
      document.getElementById('admin-question-form').scrollIntoView({behavior:'smooth'});
    },
    async saveNewQuestion(dirId, unitId){
      const type = document.getElementById('nq-type').value;
      const prompt = document.getElementById('nq-prompt').value.trim();
      const a = document.getElementById('nq-a').value.trim();
      const b = document.getElementById('nq-b').value.trim();
      const c = document.getElementById('nq-c').value.trim();
      const d2 = document.getElementById('nq-d').value.trim();
      const correct = parseInt(document.getElementById('nq-correct').value,10);
      const explain = document.getElementById('nq-explain').value.trim();
      const hintEl = document.getElementById('nq-hint');
      const hint = hintEl ? hintEl.value.trim() : '';
      if(!prompt || !a || !b || !c || !d2){ S.modal={type:'alert', msg:"Iltimos barcha maydonlarni to'ldiring."}; render(); return; }
      const d = findDir(dirId);
      const u = d.units.find(x=>x.id===unitId);
      if(u.questions.length>=50){ S.modal={type:'alert', msg:"Bu unitda allaqachon 50 ta savol bor."}; render(); return; }
      u.questions.push(Q(type, prompt, [a,b,c,d2], correct, explain, hint));
      await saveContent(S.content);
      document.getElementById('admin-question-form').innerHTML='';
      render();
    }
  };

  render();
})();
</script>
</body>
</html>
